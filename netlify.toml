[build]
  command = "npm run install:all && npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  NETLIFY = "true"
  VITE_API_URL = "/api"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mongoose", "bcryptjs"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
